<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>License Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    padding:20px;
    background:#f5f5f5;
}

h1{
    margin-bottom:20px;
}

input{
    padding:10px;
    width:250px;
}

button{
    padding:10px 15px;
    cursor:pointer;
    margin:3px;
}

.client{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.active{
    color:green;
    font-weight:bold;
}

.trial{
    color:orange;
    font-weight:bold;
}

.suspended{
    color:red;
    font-weight:bold;
}

</style>
</head>
<body>

<h1>🔑 License Dashboard</h1>

<input
    id="clientName"
    placeholder="Client Name"
/>

<button onclick="createClient()">
    Create Client
</button>

<hr>

<div id="clients"></div>

<script>

async function loadClients(){

    const response =
        await fetch("http://localhost:3000/clients");

    const clients =
        await response.json();

    const container =
        document.getElementById("clients");

    container.innerHTML = "";

    clients.forEach(client => {

        let statusClass = "";

        if(client.status === "active")
            statusClass = "active";

        if(client.status === "trial")
            statusClass = "trial";

        if(client.status === "suspended")
            statusClass = "suspended";

        container.innerHTML += `
        <div class="client">

            <h3>${client.client_name}</h3>

            <p>
                <strong>License:</strong>
                ${client.license_key}
            </p>

            <p class="${statusClass}">
                Status: ${client.status}
            </p>
<p>
  Trial Ends:
  ${client.trial_end || "-"}
</p>
            <button
            onclick="activateClient('${client.license_key}')">
                Activate
            </button>

            <button
            onclick="suspendClient('${client.license_key}')">
                Suspend
            </button>

            <button
            onclick="deleteClient('${client.license_key}')">
                Delete
            </button>

        </div>
        `;
    });
}

async function createClient(){

    const client_name =
        document.getElementById("clientName").value.trim();

    if(!client_name){
        alert("Enter client name");
        return;
    }

    await fetch(
        "http://localhost:3000/create-client",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                client_name
            })
        }
    );

    document.getElementById("clientName").value = "";

    loadClients();
}

async function activateClient(key){

    await fetch(
        "http://localhost:3000/activate-client",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                license_key:key
            })
        }
    );

    loadClients();
}

async function suspendClient(key){

    await fetch(
        "http://localhost:3000/suspend-client",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                license_key:key
            })
        }
    );

    loadClients();
}

async function deleteClient(key){

    const confirmed =
        confirm("Delete this client?");

    if(!confirmed) return;

    await fetch(
        "http://localhost:3000/delete-client",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                license_key:key
            })
        }
    );

    loadClients();
}

loadClients();

</script>

</body>
</html>
